
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us - CHAN Tech</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="style-contact.css">
    </head>

<body>
    <video class ="bg-video" autoplay muted loop playsinline>
        <source src="dark_plexus.mp4" type="video/mp4">
    </video>   

    <div class="video-overlay"></div>
    
    <div class="contact-container">
    <h2 class="form-title">Send a Message</h2>
    
    <form action="process_form.php" method="POST" enctype="multipart/form-data">
        
        <div class="form-row">
        <div class="form-group">
            <label for="inquiry">Inquiry Type <span class="required">*</span></label>
            <select id="inquiry" name="inquiry_type" required>
            <option value="" disabled selected>Please select</option>
            <option value="sales">Sales</option>
            <option value="support">Technical Support</option>
            <option value="general">General Inquiry</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="name">Name <span class="required">*</span></label>
            <input type="text" id="name" name="user_name" placeholder="Enter your name" required>
        </div>
        </div>

        <div class="form-row">
        <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="user_email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone (Optional)</label>
            <div class="phone-input-group">
            <select name="country_code" class="country-code">
                <option value="+1">🇺🇸 +1</option>
                <option value="+63">🇵🇭 +63</option>
            </select>
            <input type="tel" id="phone" name="user_phone" placeholder="Phone number">
            </div>
        </div>
        </div>

        <div class="form-group full-width">
        <label for="message">Message <span class="required">*</span></label>
        <textarea id="message" name="user_message" rows="4" placeholder="How can we help?" required></textarea>
        </div>

        <div class="form-group full-width">
        <label>Attachments</label>
            <div class="file-upload-box">
                <p>Choose file or drag here</p>
                <p class="file-support">Supported format: JPG, PNG, PDF.</p>
                <label for="attachment" class="btn btn-outline" style="padding: 8px 20px; font-size: 14px;">Browse file</label>
                <input type="file" id="attachment" name="uploaded_file" accept=".jpg,.jpeg,.png,.pdf">
            </div>
        </div>

        <button type="submit" class="btn btn-primary full-width-btn">Submit Inquiry</button>
    </form>
    <p class="text-home"><a href="index.html">Back to Home</a></p>
    </div>
</body>
</html>
